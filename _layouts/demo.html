---
layout: default
---
<h1>{{ page.title }}</h1>
<p><strong>Demo ID:</strong> {{ page.demo_id }}</p>

{{ content }}

<hr style="margin-top: 50px;">

<!-- This button uses site.github.repository_nwo to automatically get "username/repo" -->
<button onclick="window.location.href='https://github.com/{{ site.github.repository_nwo }}/issues/new?title={{ page.title | url_encode }}%20({{ page.demo_id | url_encode }})&labels=lab-demo'" 
        style="background-color: #d73a49; color: white; padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-family: sans-serif;">
  🚨 Report a Problem with {{ page.demo_id }}
</button>

<!-- The Button -->
<a id="faculty-request-btn" class="request-button" href="#">
  Request this Demo
</a>

<script>
  (function() {
    // 1. Get the data from Jekyll's Liquid variables
    const demoTitle = "{{ page.title | escape }}";
    const demoID = "{{ page.demo_id | escape }}";
    
    // 2. Define your GitHub details
    const username = "gracedono";
    const repo = "gracedono.github.io";
    const templateName = "faculty-request.yml";

    // 3. Construct the URL with query parameters matching your YAML IDs
    // We use encodeURIComponent to safely handle spaces and special characters
    const baseUrl = `https://github.com/${username}/${repo}/issues/new`;
    const params = new URLSearchParams({
      template: templateName,
      // This fills the main Issue Title at the top of the page
      title: `[REQUEST] ${demoTitle} (${demoID})`, 
      // These fill the specific form fields by ID
      demo_name: `${demoTitle} (${demoID})`,
      request_type: "Update Existing Demo"
    });

    // 4. Update the button's link
    document.getElementById('faculty-request-btn').href = `${baseUrl}?${params.toString()}`;
  })();
</script>

<style>
  /* Optional: Basic styling for your button */
  .request-button {
    display: inline-block;
    padding: 10px 20px;
    background-color: #2ea44f;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
  }
  .request-button:hover {
    background-color: #2c974b;
  }
</style>
