---
layout: default
---
<h1>{{ page.title }}</h1>
<p><strong>Demo ID:</strong> {{ page.demo_id }}</p>

{{ content }}

<hr>

<!-- A simple button that triggers a function -->
<button onclick="reportIssue()" style="background-color: #d73a49; color: white; padding: 15px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1em;">
    🚨 Report a Problem with {{ page.demo_id }}
</button>

<script>
  function reportIssue() {
    // These variables pull directly from your Jekyll page data
    const title = "[BROKEN] {{ page.title }} ({{ page.demo_id }})";
    const repo = "gracedono/gracedono.github.io";
    
    // This builds the URL perfectly without any broken slashes or plus signs
    const url = `https://github.com{repo}/issues/new?title=${encodeURIComponent(title)}&labels=lab-demo`;
    
    // Redirect the user
    window.location.href = url;
  }
</script>
