name: Faculty Demo Request
description: Request a new lab demo or update an existing one.
title: "[REQUEST]: "
labels: ["faculty-request", "needs-triage"]
body:
  - type: input
    id: instructor_name
    attributes:
      label: Instructor Name
      placeholder: e.g., Dr. Smith
    validations:
      required: true
   - type: input
    id: course_name
    attributes:
      label: Course Name/Number
      placeholder: e.g., PHYS 101
    validations:
      required: true
  - type: input
    id: demo_name
    attributes:
      label: Demo Name
      placeholder: The title of the lab demo
    validations:
      required: true
  - type: dropdown
    id: request_type
    attributes:
      label: Request Type
      options:
        - Equipment/Resource Request
    validations:
      required: true
  - type: input
    id: target_date
    attributes:
      label: Target Completion Date
      description: When do you need this demo ready for use?
      placeholder: YYYY-MM-DD
    validations:
      required: true
