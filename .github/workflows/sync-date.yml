name: Sync Setup Date to Roadmap
on:
  issues:
    types: [opened, edited]

jobs:
  update-project:
    runs-on: ubuntu-latest
    steps:
      # 1. Add to the NEW Project (v2)
      - name: Add to Project
        uses: actions/add-to-project@v1
        id: add_project
        with:
          project-url: https://github.com/users/gracedono/projects/2
          github-token: ${{ secrets.PROJECT_TOKEN }}

      # 2. Extract the date (YYYY-MM-DD)
      - name: Get Date
        id: extract_date
        run: |
          DATE=$(echo "${{ github.event.issue.body }}" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
          echo "found_date=$DATE" >> $GITHUB_OUTPUT

      # 3. Update 'Date 1' (The Start Point)
      - name: Set Date 1
        if: steps.extract_date.outputs.found_date != ''
        uses: ariatid/action-update-project-field@v1
        with:
          token: ${{ secrets.PROJECT_TOKEN }}
          project-url: https://github.com/users/gracedono/projects/2
          item-id: ${{ steps.add_project.outputs.item-id }}
          field-name: Date 1
          field-value: ${{ steps.extract_date.outputs.found_date }}

      # 4. Update 'Date 2' (The End Point)
      - name: Set Date 2
        if: steps.extract_date.outputs.found_date != ''
        uses: ariatid/action-update-project-field@v1
        with:
          token: ${{ secrets.PROJECT_TOKEN }}
          project-url: https://github.com/users/gracedono/projects/2
          item-id: ${{ steps.add_project.outputs.item-id }}
          field-name: Date 2
          field-value: ${{ steps.extract_date.outputs.found_date }}
