name: Sync Setup Date to Roadmap
on:
  issues:
    types: [opened, edited]

jobs:
  update-project-date:
    runs-on: ubuntu-latest
    steps:
      # 1. Add the issue to your project (Using the exact v1.0.2 version)
      - name: Add issue to project
        uses: actions/add-to-project@v1.0.2
        id: add-project
        with:
          project-url: https://github.com/users/gracedono/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}

      # 2. Extract the date from the issue body
      - name: Extract Date
        id: extract_date
        run: |
          DATE=$(echo "${{ github.event.issue.body }}" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
          echo "found_date=$DATE" >> $GITHUB_OUTPUT
          echo "Bot found date: $DATE"

      # 3. Update both fields so the 'Pin' appears on the roadmap
      - name: Update Project Fields
        if: steps.extract_date.outputs.found_date != ''
        run: |
          # Get the internal Project ID
          PROJECT_ID=$(gh project view 1 --owner gracedono --format json | jq -r '.id')
          
          # Sync to 'Start Date' field
          gh project item-edit --id ${{ steps.add-project.outputs.item-id }} \
            --project-id "$PROJECT_ID" --field "Start Date" \
            --date "${{ steps.extract_date.outputs.found_date }}"
          
          # Sync to 'Target Date' field
          gh project item-edit --id ${{ steps.add-project.outputs.item-id }} \
            --project-id "$PROJECT_ID" --field "Target Date" \
            --date "${{ steps.extract_date.outputs.found_date }}"
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
