name: Sync Setup Date to Roadmap
on:
  issues:
    types: [opened, edited]

jobs:
  update-project-date:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project
        uses: actions/add-to-project@v1.0.2
        id: add-project
        with:
          project-url: https://github.com/users/gracedono/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}

      - name: Extract Date
        id: extract_date
        run: |
          # Finds the YYYY-MM-DD date provided in your form
          DATE=$(echo "${{ github.event.issue.body }}" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
          echo "found_date=$DATE" >> $GITHUB_OUTPUT

      - name: Update Project Fields
        if: steps.extract_date.outputs.found_date != ''
        run: |
          # 1. Fetch the project data to find the hidden ID codes
          PROJECT_DATA=$(gh project view 1 --owner gracedono --format json)
          
          # 2. Automatically find the Project ID and the specific Field IDs
          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.id')
          START_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '.fields[] | select(.name == "Start Date") | .id')
          TARGET_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '.fields[] | select(.name == "Target Date") | .id')

          # 3. Update Start Date using the ID
          gh project item-edit --id ${{ steps.add-project.outputs.item-id }} \
            --project-id "$PROJECT_ID" \
            --field-id "$START_FIELD_ID" \
            --date "${{ steps.extract_date.outputs.found_date }}"
          
          # 4. Update Target Date using the ID
          gh project item-edit --id ${{ steps.add-project.outputs.item-id }} \
            --project-id "$PROJECT_ID" \
            --field-id "$TARGET_FIELD_ID" \
            --date "${{ steps.extract_date.outputs.found_date }}"
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
