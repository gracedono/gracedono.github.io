name: Auto-Add Single Day to Roadmap
on:
  issues:
    types: [labeled]

jobs:
  update_project:
    # Trigger only when the "faculty-request" label is added
    if: github.event.label.name == 'faculty-request'
    runs-on: ubuntu-latest
    steps:
      - name: Get Current Date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Add to Project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}

      - name: Set Both Dates to Today
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          ISSUE_ID: ${{ github.event.issue.node_id }}
          PROJECT_ID: "PROJECT_NODE_ID_HERE"
          START_FIELD_ID: "START_FIELD_NODE_ID"   # ID for 'start date'
          TARGET_FIELD_ID: "TARGET_FIELD_NODE_ID" # ID for 'target date'
        run: |
          # Set 'start date' field to today
          gh api graphql -f query='mutation($p:ID!,$i:ID!,$f:ID!,$v:Date!){updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{date:$v}}){projectV2Item{id}}}' -f p=$PROJECT_ID -f i=$ISSUE_ID -f f=$START_FIELD_ID -v v=${{ steps.date.outputs.today }}
          
          # Set 'target date' field to today
          gh api graphql -f query='mutation($p:ID!,$i:ID!,$f:ID!,$v:Date!){updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{date:$v}}){projectV2Item{id}}}' -f p=$PROJECT_ID -f i=$ISSUE_ID -f f=$TARGET_FIELD_ID -v v=${{ steps.date.outputs.today }}
