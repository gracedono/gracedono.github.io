name: Sync Issue Date to Roadmap

on:
  issues:
    types: [opened, edited]

jobs:
  update_project_date:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'faculty-request')
    steps:
      - name: Extract Date and Update Project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ROADMAP_TOKEN }}
          script: |
            const body = context.payload.issue.body;
            // This regex finds the date formatted as YYYY-MM-DD following the header
            const dateMatch = body.match(/### Target Completion Date\s+([0-9]{4}-[0-9]{2}-[0-9]{2})/);
            
            if (!dateMatch) {
              console.log("No valid date found in issue body.");
              return;
            }
            
            const targetDate = dateMatch[1];
            const projectNodeId = "PVT_kwDOA-M0s84AFzYy"; // We need your Project Node ID
            
            console.log(`Found date: ${targetDate}. Updating project...`);
            
