name: Sync Issue Date to Roadmap

on:
  issues:
    types: [opened, edited]

jobs:
  update_project_date:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'faculty-request')
    steps:
      - name: Sync Date
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ROADMAP_TOKEN }}
          script: |
            const body = context.payload.issue.body;
            // Matches the YYYY-MM-DD date specifically under the Target Completion Date header
            const dateMatch = body.match(/### Target Completion Date\s+([0-9]{4}-[0-9]{2}-[0-9]{2})/);
            
            if (!dateMatch) {
              console.log("No valid date found in issue body. Skipping sync.");
              return;
            }

            const targetDate = dateMatch[1];
            const issueNodeId = context.payload.issue.node_id;
            
            const projectId = "PVT_kwHOCFtHoc4BS-72"; 
            const fieldId = "PVTF_lAHOCFtHoc4BS-72zhAW80A";

            console.log(`Found date: ${targetDate}. Adding issue to project...`);

            // 1. Ensure the issue is added to the project
            const addResult = await github.graphql(`
              mutation($project:ID!, $item:ID!) {
                addProjectV2ItemById(input: {projectId: $project, contentId: $item}) {
                  item { id }
                }
              }`, { project: projectId, item: issueNodeId });

            const itemId = addResult.addProjectV2ItemById.item.id;
            console.log(`Item ID in project: ${itemId}. Setting Target Date...`);

            // 2. Set the "Target Date" field value
            await github.graphql(`
              mutation($project:ID!, $item:ID!, $field:ID!, $date:Date!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project, itemId: $item, fieldId: $field, value: { date: $date }
                }) { clientMutationId }
              }`, { 
                project: projectId, 
                item: itemId, 
                field: fieldId, 
                date: targetDate 
              });
            
            console.log("Success! Roadmap bar should now be visible.");
